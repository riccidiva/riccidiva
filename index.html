<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Acting Portfolio</title>
    <style>
        /* Resetting margins and paddings for consistency */
        body, html {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body styling */
        body {
            font-family: 'Arial', sans-serif;
            background: radial-gradient(circle, #200038, #000);
            color: #f7e92f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            min-height: 100vh;
        }

        /* Header styling */
        header {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 20px;
        }

        header img {
            position: absolute;
            top: 10px;
            left: 20px;
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #f7e92f;
            box-shadow: 0 0 15px rgba(247, 233, 47, 0.6), 0 0 30px rgba(247, 233, 47, 0.3);
        }

        header h1 {
            font-size: 3rem;
            color: #f7e92f;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
            text-align: center;
        }

        /* Portfolio Section */
        section {
            max-width: 900px;
            width: 100%;
        }

        section h2 {
            font-size: 2rem;
            color: #f7e92f;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
        }

        .audio-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .audio-item:hover {
            border-color: #f700ff;
            background: linear-gradient(145deg, rgba(55, 0, 65, 0.8), rgba(30, 0, 40, 0.8));
            box-shadow: 0 0 20px rgba(247, 0, 255, 0.6);
            transform: scale(1.02);
        }

        .audio-item span {
            font-size: 1.2rem;
            color: #f7e92f;
            flex: 1;
        }

        audio {
            flex: 1;
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 30px;
            color: #f7e92f;
            text-shadow: 0 0 5px #ff00ff;
        }

        footer a {
            color: #f700ff;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        footer a:hover {
            color: #f7e92f;
            text-shadow: 0 0 15px #ff00ff;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                padding-top: 50px; /* Leave space on top for background image */
            }

            header img {
                width: 80px; /* Smaller logo */
                height: 80px;
                position: absolute;
                top: 10px; /* Align to the very top */
                left: 10px; /* Move to the very corner */
            }

            header h1 {
                margin-top: 100px; /* Space below the logo */
                font-size: 1.8rem; /* Slightly smaller text for phones */
                text-align: center;
                width: 100%; /* Center the text horizontally */
            }

            section h2 {
                font-size: 1.5rem;
            }

            .audio-item span {
                font-size: 1rem;
            }
        }
    </style>
</head>
