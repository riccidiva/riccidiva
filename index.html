<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Acting Portfolio</title>
    <style>
        /* Resetting margins and paddings for consistency */
        body, html {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body styling */
        body {
            font-family: 'Arial', sans-serif;
            color: #f7e92f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            min-height: 100vh;
            position: relative;
            background-image: url('BACKGROUND.png'); /* Background image */
            background-size: cover; /* Ensure the background image covers the full screen */
            background-position: center; /* Center the background image */
            background-attachment: fixed; /* Ensure the background doesn't scroll */
        }

        /* Header styling */
        header {
            width: 100%;
            display: flex;
            flex-direction: column; /* Stack logo and text vertically */
            align-items: center; /* Center items horizontally */
            justify-content: center; /* Center items vertically */
            position: relative;
            margin-bottom: 20px;
            z-index: 2; /* Ensure the header stays above the background */
            text-align: center; /* Ensure header text is centered */
        }

        header img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #f7e92f;
            box-shadow: 0 0 15px rgba(247, 233, 47, 0.6), 0 0 30px rgba(247, 233, 47, 0.3);
        }

        header h1 {
            font-size: 3rem;
            color: #f7e92f;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
            margin-top: 20px; /* Add spacing between logo and text */
        }

        /* Portfolio Section */
        section {
            max-width: 900px;
            width: 100%;
        }

        section h2 {
            font-size: 2rem;
            color: #f7e92f;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
        }

        .audio-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .audio-item:hover {
            border-color: #f700ff;
            background: linear-gradient(145deg, rgba(55, 0, 65, 0.8), rgba(30, 0, 40, 0.8));
            box-shadow: 0 0 20px rgba(247, 0, 255, 0.6);
            transform: scale(1.02);
        }

        .audio-item span {
            font-size: 1.2rem;
            color: #f7e92f;
            flex: 1;
        }

        audio {
            flex: 1;
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 30px;
            color: #f7e92f;
            text-shadow: 0 0 5px #ff00ff;
        }

        footer a {
            color: #f700ff;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        footer a:hover {
            color: #f7e92f;
            text-shadow: 0 0 15px #ff00ff;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header img {
                width: 80px; /* Shrink logo */
                height: 80px;
                position: relative; /* Adjust the logo positioning */
                top: 10px;
                left: 0; /* Keep it centered */
            }

            header h1 {
                font-size: 2rem; /* Adjust font size */
                margin-top: 20px;
            }

            section h2 {
                font-size: 1.5rem; /* Reduce size for mobile */
            }

            .audio-item span {
                font-size: 1rem; /* Adjust audio item text size */
            }
        }
    </style>
</head>
<body>
    <header>
        <img src="images/logo" alt="Logo">
        <h1>Diva Ricci - VA Pf</h1>
    </header>
    <section>
        <h2>Pf</h2>
        <div class="audio-item">
            <audio controls>
                <source src="audio1.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>
        <div class="audio-item">
            <audio controls>
                <source src="audiosamples/audio11.wav" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>
        <div class="audio-item">
            <audio controls>
                <source src="audio3.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>
    </section>
    <footer>
        <p>© 2024 Diva Ricci | Contact me at <a href="mailto:riccidiva99@gmail.com">divaricci@gmail.com</a></p>
    </footer>
</body>
</html>
